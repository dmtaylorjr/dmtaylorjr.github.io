<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Douglas Taylor Jr.</title>
  <meta name="description" content="Photo & Film · IT & Cybersecurity — Douglas Taylor Jr." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #0D0D0D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3.5rem 1.5rem 4rem;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow-x: hidden;
    }
 
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }
 
    .aperture {
      width: 72px;
      height: 72px;
      margin-bottom: 1.8rem;
      opacity: 0.85;
    }
 
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      color: #F0EDE6;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      text-align: center;
      line-height: 1;
    }
 
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.05rem;
      color: #C9A84C;
      letter-spacing: 0.05em;
      margin-bottom: 2.2rem;
      text-align: center;
    }
 
    .divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, transparent, #8a6e2f, transparent);
      margin: 0 auto 2.2rem;
    }
 
    .links {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
 
    .link-card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: #161614;
      border: 0.5px solid #2a2a28;
      border-radius: 3px;
      padding: 1.1rem 1.4rem;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      position: relative;
      overflow: hidden;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
 
    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: #C9A84C;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
 
    .link-card:hover {
      background: #1e1e1b;
      border-color: #3d3d3a;
      transform: translateX(3px);
    }
 
    .link-card:hover::before { opacity: 1; }
 
    .card-icon {
      width: 38px;
      height: 38px;
      border: 0.5px solid #2a2a28;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    .card-icon svg {
      width: 18px;
      height: 18px;
      stroke: #C9A84C;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    .card-text { flex: 1; }
 
    .card-label {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #666660;
      display: block;
      margin-bottom: 2px;
    }
 
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.15rem;
      color: #F0EDE6;
      display: block;
      letter-spacing: 0.02em;
    }
 
    .card-arrow {
      color: #8a6e2f;
      transition: color 0.2s ease, transform 0.2s ease;
      font-size: 1rem;
    }
 
    .link-card:hover .card-arrow {
      color: #C9A84C;
      transform: translateX(3px);
    }
 
    .footer-text {
      margin-top: 3rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: #333330;
      text-align: center;
      text-transform: uppercase;
    }
 
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #C9A84C;
      color: #0D0D0D;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
 
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
 
  <!-- Aperture logo mark -->
  <svg class="aperture" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="36" cy="36" r="30" stroke="#C9A84C" stroke-width="0.75" opacity="0.5"/>
    <circle cx="36" cy="36" r="22" stroke="#C9A84C" stroke-width="0.75" opacity="0.8"/>
    <circle cx="36" cy="36" r="6" fill="#C9A84C" opacity="0.9"/>
    <line x1="36" y1="6" x2="36" y2="14" stroke="#C9A84C" stroke-width="0.75" opacity="0.5"/>
    <line x1="36" y1="58" x2="36" y2="66" stroke="#C9A84C" stroke-width="0.75" opacity="0.5"/>
    <line x1="6" y1="36" x2="14" y2="36" stroke="#C9A84C" stroke-width="0.75" opacity="0.5"/>
    <line x1="58" y1="36" x2="66" y2="36" stroke="#C9A84C" stroke-width="0.75" opacity="0.5"/>
    <line x1="15" y1="15" x2="21" y2="21" stroke="#C9A84C" stroke-width="0.75" opacity="0.3"/>
    <line x1="51" y1="51" x2="57" y2="57" stroke="#C9A84C" stroke-width="0.75" opacity="0.3"/>
    <line x1="57" y1="15" x2="51" y2="21" stroke="#C9A84C" stroke-width="0.75" opacity="0.3"/>
    <line x1="21" y1="51" x2="15" y2="57" stroke="#C9A84C" stroke-width="0.75" opacity="0.3"/>
  </svg>
 
  <h1 class="name">Douglas Taylor Jr.</h1>
  <p class="tagline">Photo &amp; Film &middot; IT &amp; Cybersecurity</p>
  <div class="divider"></div>
 
  <div class="links">
 
    <!-- Byte House Productions -->
    <a class="link-card" href="https://getabyte.netlify.app/" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M15 10l-4 4l6 6l4-16l-18 7l4 2l2 6l3-4"/></svg>
      </div>
      <div class="card-text">
        <span class="card-label">Production House</span>
        <span class="card-title">Byte House Productions</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
 
    <!-- GitHub -->
    <a class="link-card" href="https://github.com/dmtaylorjr" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      </div>
      <div class="card-text">
        <span class="card-label">IT &amp; Cyber Portfolio</span>
        <span class="card-title">GitHub</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
 
    <!-- LinkedIn -->
    <a class="link-card" href="https://www.linkedin.com/in/douglas-taylor-jr-993127265/" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </div>
      <div class="card-text">
        <span class="card-label">Professional Network</span>
        <span class="card-title">LinkedIn</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
 
    <!-- Save Contact -->
    <button class="link-card" onclick="saveContact()">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="card-text">
        <span class="card-label">Save to Phone</span>
        <span class="card-title">Add Contact</span>
      </div>
      <span class="card-arrow">↓</span>
    </button>
 
  </div>
 
  <p class="footer-text">&copy; 2026 Douglas Taylor Jr.</p>
 
  <div class="toast" id="toast">Contact saved</div>
 
  <script>
    function saveContact() {
      window.location.href = 'https://dmtaylorjr.github.io/douglas-taylor-jr.vcf';
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
 
</body>
</html>
